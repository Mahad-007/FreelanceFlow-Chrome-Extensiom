<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreelanceFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #030712;
      color: #f3f4f6;
    }
    h1 { font-size: 18px; font-weight: 700; color: #29a5ff; margin-bottom: 8px; }
    p { font-size: 13px; color: #9ca3af; margin-bottom: 12px; }
    .status { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .status-text { font-size: 12px; color: #9ca3af; }
    button {
      width: 100%;
      padding: 10px;
      background: #1187f5;
      color: white;
      border: 2px solid #0a6fe1;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
      transition: all 0.1s;
    }
    button:hover { background: #29a5ff; }
    button:active { box-shadow: none; transform: translate(3px, 3px); }
  </style>
</head>
<body>
  <h1>FreelanceFlow</h1>
  <p>AI-powered freelance assistant for Upwork</p>
  <div class="status" id="status">
    <div class="dot dot-red" id="dot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>
  <button id="openPanel">Open Side Panel</button>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
